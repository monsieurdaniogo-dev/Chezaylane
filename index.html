<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Résidence Aylane</title>
</head>
<body>
    <header>
        <nav>
            <h1>Résidence Aylane</h1>
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#tarifs">Tarifs</a></li>
                <li><a href="#location">Location</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="hero">
        <h2>Welcome to Résidence Aylane</h2>
        <p>Your home away from home.</p>
    </section>

    <section id="about">
        <h2>About Us</h2>
        <div class="features">
            <div class="feature">Feature 1</div>
            <div class="feature">Feature 2</div>
            <div class="feature">Feature 3</div>
        </div>
    </section>

    <section id="gallery">
        <h2>Gallery</h2>
        <div class="images">
            <img src="image1.jpg" alt="Image 1">
            <img src="image2.jpg" alt="Image 2">
            <img src="image3.jpg" alt="Image 3">
        </div>
    </section>

    <section id="tarifs">
        <h2>Tarifs</h2>
        <div class="tarif-card">Tarif 1</div>
        <div class="tarif-card">Tarif 2</div>
        <div class="tarif-card">Tarif 3</div>
    </section>

    <section id="location">
        <h2>Our Location</h2>
        <div class="map-placeholder">Map will be here</div>
    </section>

    <section id="contact">
        <h2>Contact Us</h2>
        <form id="contact-form">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Your Message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Résidence Aylane</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>

<style>
:root {
    --gold: #FFD700;
    --dark-bg: #121212;
    --light-bg: #FFFFFF;
}

body {
    background-color: var(--light-bg);
    color: var(--dark-bg);
    font-family: Arial, sans-serif;
}

header {
    background-color: var(--gold);
}

nav ul {
    list-style-type: none;
    padding: 0;
}

nav ul li {
    display: inline;
    margin: 0 15px;
}

@media (max-width: 600px) {
    nav ul li {
        display: block;
        margin: 10px 0;
    }
}
</style>

<script>
document.getElementById('contact-form').addEventListener('submit', function(event) {
    event.preventDefault();
    alert('Form submitted!');
});
</script>
