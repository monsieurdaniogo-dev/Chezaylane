<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résidence Aylane</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background: #35424a; color: #ffffff; padding: 10px 0; text-align: center; }
        main { padding: 20px; }
        footer { text-align: center; padding: 10px; background: #35424a; color: #ffffff; }
        .toggle { margin: 10px 0; }
        form { display: flex; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>Bienvenue à Résidence Aylane</h1>
        <div class="toggle">
            <button id="lang-toggle">Français / English</button>
        </div>
    </header>
    <main>
        <h2>Contact Us</h2>
        <form id="contact-form">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>
            <button type="submit">Submit</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 Résidence Aylane | All Rights Reserved</p>
    </footer>
    <script>
        let langToggle = document.getElementById('lang-toggle');
        langToggle.addEventListener('click', function() {
            let header = document.querySelector('header h1');
            if (header.textContent === 'Bienvenue à Résidence Aylane') {
                header.textContent = 'Welcome to Residence Aylane';
            } else {
                header.textContent = 'Bienvenue à Résidence Aylane';
            }
        });
        let form = document.getElementById('contact-form');
        form.addEventListener('submit', function(event) {
            event.preventDefault();
            alert('Form submitted!');
            form.reset();
        });
    </script>
</body>
</html>
